apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
spec:
  replicas: {{ .Values.employee.replicaCount }}
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
        - name: employee-service
          image: "{{ .Values.employee.image }}"
          ports:
            - containerPort: {{ .Values.employee.port }}